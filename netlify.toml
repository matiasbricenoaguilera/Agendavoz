[build]
  publish = "public"
  command = "echo 'Serverless — sin paso de build'"

[dev]
  framework = "#static"
  port = 8888
  targetPort = 3000

[functions]
  node_bundler = "esbuild"
  directory = "netlify/functions"

# Timeout máximo para funciones síncronas en Netlify (26 segundos)
[functions."telegram-bot"]
  timeout = 26

# Resumen diario: lunes a viernes a las 08:00 hora Chile (12:00 UTC con UTC-4)
[functions."daily-summary"]
  timeout = 30
  schedule = "0 12 * * 1-5"

[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200

[context.production.environment]
  NODE_ENV = "production"

[context.deploy-preview.environment]
  NODE_ENV = "preview"
