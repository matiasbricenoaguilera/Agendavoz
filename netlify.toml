[build]
  publish = "public"
  command = "echo 'Serverless — sin paso de build'"

[dev]
  framework = "#static"
  port = 8888
  targetPort = 3000

[functions]
  node_bundler = "esbuild"
  directory = "netlify/functions"

# Timeout máximo para funciones síncronas en Netlify (26 segundos)
# Para tiempos de procesamiento mayores considera migrar a Background Functions
[functions."telegram-bot"]
  timeout = 26

[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/:splat"
  status = 200

[context.production.environment]
  NODE_ENV = "production"

[context.deploy-preview.environment]
  NODE_ENV = "preview"
